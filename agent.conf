# ForensicLogX Agent Configuration File

[server]
# The central ForensicLogX server URL
server_url=http://127.0.0.1:5000
# API Authentication token (optional/FYP demo placeholder)
api_key=FLX-DEMO-TOKEN-2026

[agent]
# Unique identifier for this agent
agent_id=ubuntu-dvwa-agent-01
# Log sources configuration
# Note: Comment out or leave empty to disable tailing for a specific file
apache_access=/var/log/apache2/access.log
apache_error=/var/log/apache2/error.log
modsec_audit=/var/log/modsec_audit.log
auth_log=/var/log/auth.log
syslog=/var/log/syslog

# Optional Nginx log files (uncomment to enable)
#nginx_access=/var/log/nginx/access.log
#nginx_error=/var/log/nginx/error.log

# Heartbeat interval in seconds
heartbeat_interval=60
# Queue flush interval (retries, pushes) in seconds
flush_interval=5
